# HTTPS override — use on a public server with a real domain + certificate.
#
# Prereq: place certificate files in ./certs/ on the host:
#   ./certs/fullchain.pem   (leaf + intermediate, concatenated, leaf first)
#   ./certs/privkey.pem     (private key)
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
# Or use ./run-https.sh.
#
# CORS origins are configured for locoguess.ru by default — change if
# deploying under a different domain.
services:
  backend:
    environment:
      LOCOGUESS_CORS_ORIGINS: '["https://locoguess.ru","https://www.locoguess.ru","http://locoguess.ru","http://www.locoguess.ru"]'
      # LOCOGUESS_ADMIN_PASSWORD is inherited from the base compose file's
      # environment block (which passes it through from the host env).

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MAP_PROVIDER: google
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
