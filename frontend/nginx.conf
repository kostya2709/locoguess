server {
    listen 80;
    client_max_body_size 100M;

    # Offline map tiles (mounted read-only from host in offline mode; empty otherwise).
    # Must come BEFORE the catch-all `location /` so missing tiles 404 instead of
    # falling through to index.html.
    location /tiles/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy photo requests to backend
    location /photos/ {
        proxy_pass http://backend:8000;
    }

    # Proxy WebSocket connections
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
